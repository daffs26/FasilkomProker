<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/src/assets/logo-bem.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fasilkom Proker</title>
    <script>
      (function() {
        const savedTheme = localStorage.getItem('FasilkomProker-theme') || 'dark';
        if (savedTheme === 'light') {
          document.documentElement.classList.add('light');
        } else {
          document.documentElement.classList.remove('light');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
